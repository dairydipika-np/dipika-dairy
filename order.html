<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Processing Gateway | Dipika Dairy</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --brand-blue: #1e3a8a; --bg-clean: #f8fafc; --surface: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        html, body { overflow-x: hidden; width: 100%; background-color: var(--bg-clean); padding: 1.5rem 0.5rem; }
        
        .manifest-container { width: 100%; max-width: 700px; margin: 0 auto; background: var(--surface); border: 1px solid #e2e8f0; border-radius: 8px; padding: 1.5rem 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.01); }
        h2 { font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--primary); margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom: 2px solid #f1f5f9; text-align: center; line-height: 1.4; }
        
        /* Flexible Cart Grid System for Mobile Layouts */
        .cart-row { display: flex; flex-direction: column; gap: 1rem; padding: 1rem; border-bottom: 1px solid #f1f5f9; background: #fafafa; margin-bottom: 0.5rem; border-radius: 4px; }
        .cart-details h4 { font-weight: 600; color: var(--primary); font-size: 0.95rem; }
        .cart-details p { font-size: 0.75rem; color: #94a3b8; margin-top: 0.15rem; }
        
        .adjust-box { display: flex; align-items: center; justify-content: flex-start; gap: 0.75rem; width: 100%; }
        .btn-ctrl { background: white; border: 1px solid #cbd5e1; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; border-radius: 4px; cursor: pointer; }
        .btn-del { color: #dc2626; background: none; border: none; font-size: 0.85rem; font-weight: 500; cursor: pointer; margin-left: auto; padding: 0.5rem 0; }

        .auth-block { margin-top: 2.5rem; background: #f8fafc; border: 1px solid #e2e8f0; padding: 1.25rem 1rem; border-radius: 6px; }
        .auth-block h3 { font-size: 0.9rem; font-weight: 600; color: var(--primary); margin-bottom: 1rem; letter-spacing: 0.5px; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: #64748b; margin-bottom: 0.3rem; }
        .form-group input { width: 100%; padding: 0.8rem; border: 1px solid #cbd5e1; border-radius: 4px; outline: none; background: #fff; font-size: 0.95rem; -webkit-appearance: none; }

        .btn-transmit { background: var(--brand-blue); color: white; border: none; width: 100%; padding: 1rem; font-weight: 600; font-size: 0.95rem; border-radius: 4px; cursor: pointer; box-shadow: 0 4px 10px rgba(30,38,138,0.15); }
        .btn-transmit:disabled { background: #94a3b8; }

        @media (min-width: 768px) {
            html, body { padding: 3rem 1rem; }
            .manifest-container { padding: 3rem 2rem; }
            h2 { font-size: 1.5rem; text-align: left; }
            .cart-row { flex-direction: row; justify-content: space-between; align-items: center; padding: 1.25rem 1rem; }
            .adjust-box { width: auto; }
            .btn-ctrl { width: 32px; height: 32px; font-size: 1rem; }
            .btn-del { margin-left: 1rem; padding: 0; }
            .auth-block { padding: 2rem; }
            .auth-block h3 { font-size: 1rem; }
            .btn-transmit { padding: 1.2rem; font-size: 1rem; }
        }
    </style>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("8cOLlQ6W3wJ0A3V7Z"); 
        })();
    </script>
</head>
<body>

    <main class="manifest-container">
        <h2>Corporate Processing Verification Gateway</h2>
        <div id="manifestList"></div>

        <div class="auth-block">
            <h3>Authorized Verification Release Confirmation</h3>
            <div class="form-group">
                <label>Confirm Registered Party Account</label>
                <input type="text" id="vName" required>
            </div>
            <div class="form-group">
                <label>Confirm Verification Contact Link</label>
                <input type="text" id="vPhone" required>
            </div>
            <button id="transmitBtn" class="btn-transmit">TRANSMIT ORDER TO PRODUCTION BLOCK</button>
        </div>
    </main>

    <script>
        const sessionData = JSON.parse(localStorage.getItem('dipika_b2b_session')) || { name: '', phone: '' };
        let cart = JSON.parse(localStorage.getItem('dipika_active_cart')) || [];
        
        document.getElementById('vName').value = sessionData.name;
        document.getElementById('vPhone').value = sessionData.phone;

        function drawManifest() {
            const container = document.getElementById('manifestList');
            if(cart.length === 0) {
                container.innerHTML = `<p style="text-align:center; padding: 2rem 0; color: #94a3b8; font-size:0.85rem;">No entries active inside production basket configuration.</p>`;
                document.getElementById('transmitBtn').disabled = true;
                return;
            }

            container.innerHTML = '';
            cart.forEach((item, idx) => {
                const row = document.createElement('div');
                row.className = 'cart-row';
                row.innerHTML = `
                    <div class="cart-details">
                        <h4>${item.name}</h4>
                        <p>Variant Assignment: ${item.unit}</p>
                    </div>
                    <div class="adjust-box">
                        <button class="btn-ctrl" onclick="modQty(${idx}, -1)">-</button>
                        <span style="font-weight: 600; font-size: 0.95rem; width:30px; text-align:center;">${item.qty}</span>
                        <button class="btn-ctrl" onclick="modQty(${idx}, 1)">+</button>
                        <button class="btn-del" onclick="wipe(${idx})">Purge</button>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        window.modQty = function(idx, change) {
            let newVal = parseFloat(cart[idx].qty) + change;
            if(newVal <= 0) { wipe(idx); }
            else { cart[idx].qty = newVal; saveState(); }
        }

        window.wipe = function(idx) {
            cart.splice(idx, 1);
            saveState();
        }

        function saveState() {
            localStorage.setItem('dipika_active_cart', JSON.stringify(cart));
            drawManifest();
        }

        document.getElementById('transmitBtn').addEventListener('click', () => {
            const chkName = document.getElementById('vName').value.trim();
            const chkPhone = document.getElementById('vPhone').value.trim();

            if(chkName.toLowerCase() !== sessionData.name.toLowerCase() || chkPhone !== sessionData.phone) {
                alert("Security Authorization Failed: Mismatched configuration credentials.");
                return;
            }

            const btn = document.getElementById('transmitBtn');
            btn.innerText = "TRANSMITTING MANIFEST INVOICE...";
            btn.disabled = true;

           // NEW VERTICAL GRID FORMAT
// PERFECT HTML VERTICAL BREAK FORMAT
        let plainTextSummary = "";

        cart.forEach(item => {
            plainTextSummary += `• <b>${item.name}</b> — ${item.qty} ${item.unit}<br>`;
        });

            const emailPayload = {
                party_name: sessionData.name.toUpperCase(),
                party_contact: sessionData.phone,
                order_details: plainTextSummary
            };

            emailjs.send('service_yswmc5p', 'template_8180zbl', emailPayload)
                .then(() => {
                    alert(`Verification Confirmed. Enterprise Manifest securely dispatched to production desk (dairydipika@gmail.com).`);
                    localStorage.removeItem('dipika_active_cart');
                    window.location.href = 'index.html';
                }, (err) => {
                    alert("API Connection Error. Failed transmission routing pipelines.");
                    btn.innerText = "TRANSMIT ORDER TO PRODUCTION BLOCK";
                    btn.disabled = false;
                });
        });

        drawManifest();
    </script>
</body>
</html>
